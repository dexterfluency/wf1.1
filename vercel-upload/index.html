<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>WF1 Diagnostics</title>
    <style>
      body {
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto,
          Helvetica, Arial, "Apple Color Emoji", "Segoe UI Emoji";
        margin: 24px;
        color: #111827;
      }
      .card {
        border: 1px solid #e5e7eb;
        border-radius: 12px;
        padding: 16px;
        max-width: 900px;
      }
      .row {
        display: flex;
        gap: 12px;
        align-items: baseline;
        flex-wrap: wrap;
      }
      .tag {
        display: inline-block;
        padding: 2px 8px;
        border-radius: 999px;
        font-size: 12px;
        border: 1px solid #e5e7eb;
        background: #f9fafb;
      }
      pre {
        background: #0b1020;
        color: #e5e7eb;
        padding: 12px;
        border-radius: 10px;
        overflow: auto;
        font-size: 12px;
      }
      button {
        padding: 8px 12px;
        border-radius: 10px;
        border: 1px solid #e5e7eb;
        background: white;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="row">
        <h1 style="margin: 0; font-size: 18px">WF1 Diagnostics</h1>
        <span id="statusTag" class="tag">Loading…</span>
        <button id="refreshBtn" type="button">Refresh</button>
      </div>
      <p style="margin: 10px 0 12px; color: #374151">
        This page reads <code>/api/diagnostics</code>. For full logs, use Vercel →
        Functions → Logs.
      </p>
      <pre id="output">{}</pre>
    </div>

    <script>
      const output = document.getElementById("output");
      const statusTag = document.getElementById("statusTag");
      const refreshBtn = document.getElementById("refreshBtn");

      function setStatus(ok) {
        statusTag.textContent = ok ? "OK" : "Missing env vars";
        statusTag.style.background = ok ? "#ecfdf5" : "#fff7ed";
        statusTag.style.borderColor = ok ? "#a7f3d0" : "#fed7aa";
      }

      async function load() {
        statusTag.textContent = "Loading…";
        statusTag.style.background = "#f9fafb";
        statusTag.style.borderColor = "#e5e7eb";

        try {
          const res = await fetch("/api/diagnostics", { cache: "no-store" });
          const json = await res.json();
          setStatus(Boolean(json.ok));
          output.textContent = JSON.stringify(json, null, 2);
        } catch (e) {
          statusTag.textContent = "Error";
          statusTag.style.background = "#fef2f2";
          statusTag.style.borderColor = "#fecaca";
          output.textContent = String(e);
        }
      }

      refreshBtn.addEventListener("click", load);
      load();
    </script>
  </body>
</html>
